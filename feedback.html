<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback Form</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Page wrapper to match professional theme */
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 100px 16px 60px; /* leave space for fixed navbar */
      margin: 0;
    }

    .feedback-wrap{
      width: 100%;
      max-width: 720px;
      background: rgba(255, 255, 255, 0.193);
      border: 1px solid rgba(255, 255, 255, 0.093);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.433);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .feedback-header{
      padding: 28px 26px;
      background: linear-gradient(120deg, rgba(13,110,253,0.25), rgba(46,204,113,0.10));
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }

    .feedback-header h1{
      font-size: 28px;
      letter-spacing: 0.5px;
      color: rgba(0, 0, 0, 0.98);
      text-align: center;
      margin-bottom: 6px;
    }

    .feedback-header p{
      text-align: center;
      color: rgba(0, 0, 0, 0.75);
      line-height: 1.5;
      font-size: 14.5px;
    }

    form{
      padding: 22px 26px 26px;
    }

    .form-grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 16px;
    }

    @media (max-width: 640px){
      .form-grid{ grid-template-columns: 1fr; }
      body{ padding-top: 120px; }
    }

    .form-group{
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label{
      color: rgba(0, 0, 0, 0.9);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.2px;
    }

    .req{
      color: rgb(255, 0, 0);
      font-weight: 900;
      margin-left: 2px;
    }

    input, textarea, select{
      width: 100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(0, 0, 0, 0.18);
      color: rgba(0, 0, 0, 0.91);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    input::placeholder, textarea::placeholder{
      color: rgb(255, 255, 255);
    }

    input:focus, textarea:focus, select:focus{
      border-color: rgba(13,110,253,0.8);
      box-shadow: 0 0 0 4px rgba(13,110,253,0.22);
      background: rgba(0,0,0,0.22);
    }

    textarea{
      min-height: 120px;
      resize: vertical;
    }

    .span-2{
      grid-column: 1 / -1;
    }

    .actions{
      margin-top: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .btn-primary{
      border: 0;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 12px;
      background: rgba(13,110,253,0.98);
      color: white;
      font-weight: 700;
      letter-spacing: 0.2px;
      transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary:hover{
      background: rgba(8,78,194,1);
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(13,110,253,0.25);
    }

    .btn-secondary{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.22);
      text-decoration: none;
      color: rgba(13,110,253,0.98);
      font-weight: 700;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .btn-secondary:hover{
      background: rgba(255,255,255,0.10);
      transform: translateY(-2px);
    }

    .thank-you{
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(183, 205, 236, 0.98);
      border: 1px solid rgba(13,110,253,0.98);
      color: rgba(42, 166, 255, 0.95);
      font-weight: 900;
      text-align: center;
    }

    
  </style>
</head>
<body>

  <div class="feedback-wrap">
    <div class="feedback-header">
      <h1>FEEDBACK</h1>
      <p>
        Share your thoughts about my portfolio. Your feedback helps me improve the UI, projects & content.
      </p>

    </div>

    <form id="feedbackForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Name <span class="req">*</span></label>
          <input type="text" id="name" placeholder="Your full name" required />
        </div>

        <div class="form-group">
          <label for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group span-2">
          <label for="topic">Topic</label>
          <select id="topic">
            <option value="Portfolio">Portfolio</option>
            <option value="Projects">Projects</option>
            <option value="Experiences">Experiences</option>
            <option value="UI/UX">UI/UX</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group span-2">
          <label for="message">Your Feedback <span class="req">*</span></label>
          <textarea id="message" placeholder="Write your feedback here..." required></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" type="submit">Submit Feedback</button>
        <a class="btn-secondary" href="index.html">← Back to Home</a>
      </div>

      <div class="thank-you" id="thankYouMsg">Thank you for your feedback! ✅</div>
    </form>
  </div>

  <script>
    const form = document.getElementById("feedbackForm");
    const thankYouMsg = document.getElementById("thankYouMsg");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      if (name && email && message) {
        form.reset();
        thankYouMsg.style.display = "block";

        setTimeout(() => {
          thankYouMsg.style.display = "none";
        }, 3000);
      } else {
        alert("Please fill out all required fields.");
      }
    });
  </script>

</body>
</html>
